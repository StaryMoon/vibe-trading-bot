project:
  name: vibe-trading-bot
  timezone: Asia/Shanghai

trading_mode: live

database:
  path: data/vibe_trader_live_5u.sqlite3

exchange:
  name: binance
  sandbox: false
  symbols: ["BTC/USDT", "ETH/USDT"]
  timeframes: ["15m", "1h", "4h"]
  ohlcv_limit: 260
  synthetic_seed: 14789

portfolio:
  initial_cash: 5.0
  quote_currency: USDT

strategy:
  name: trend_rsi_macd
  fast_ma: 20
  slow_ma: 50
  trend_ma: 200
  rsi_period: 14
  rsi_entry_min: 45
  rsi_entry_max: 72
  rsi_exit_min: 38
  atr_period: 14
  volume_ma: 20
  min_volume_ratio: 0.75
  stop_loss_pct: 0.012
  take_profit_pct: 0.024
  trailing_stop_pct: 0.015

risk:
  max_symbol_exposure_pct: 1.0
  max_total_exposure_pct: 1.0
  max_single_trade_loss_pct: 0.03
  max_daily_loss_pct: 0.10
  cooldown_minutes: 240
  max_consecutive_losses: 1
  max_price_gap_pct: 0.06
  stale_candle_minutes: 45
  min_quote_balance: 0.0
  dust_base_qty: 0.000001
  require_reconciliation: true
  allow_live_trading: true

execution:
  order_type: market
  quote_order_size_pct: 1.0
  max_order_quote: 5.0
  slippage_bps: 20
  fee_bps: 10

reporting:
  obsidian_dir: reports/obsidian
  dashboard_file: reports/obsidian/account_dashboard.md

schedule:
  interval_minutes: 15

ai:
  provider: local
  model: ""
